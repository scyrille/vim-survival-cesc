
# ============================================================
# Global configuration file for data analysis
# ============================================================

# Seed for reproducibility 
seed: 123

# Cohorts 
cohorts:
  - "raids"
  - "tcga"
  
# Data dir
data:
  raw_dir: "data/raw"
  processed_dir: "data/processed"

# Outputs
results_dir: "outputs/results"
tables_dir: "outputs/tables"
plots_dir: "outputs/figures"

# Lasso regression 
lasso:
  cv_folds: 5
  
# Likelihood-based boosting  
CoxBoost:
  cv_folds: 10 

# Model-agnostic, algorithm-free variable importance relative to full feature vector
survML_full:
  type: "AUC"
  landmark:
    - 12
    - 24
    - 36
  cv_folds: 5
  cf_folds: 5
  bin_size: 0.5
  
# Model-agnostic, algorithm-free variable importance relative to base model 
survML_base: 
  type: "AUC" 
  landmark: 24 
  cv_folds: 5
  cf_folds: 5
  bin_size: 0.1
